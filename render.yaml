# Render Blueprint — PRODUCTION
# https://render.com/docs/blueprint-spec
# Connect this repo in Render and apply the blueprint, then set secrets in the dashboard.
# Staging twin (separate names/DB): see render.staging.yaml

services:
  - type: web
    name: cinetaste-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/v1/ready
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      # Set this BEFORE first deploy to your real Vercel URL (required in production).
      # Temporary placeholder is OK; update after Vercel is live, then redeploy.
      - key: CORS_ORIGINS
        value: https://cinetaste.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cinetaste-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cinetaste-redis
          type: redis
          property: connectionString
      - key: TMDB_API_KEY
        sync: false
      - key: WATCH_PROVIDER_REGION
        value: "US"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: APP_NAME
        value: CineTaste
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        value: "0.1"

  - type: redis
    name: cinetaste-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: cinetaste-db
    plan: starter
    postgresMajorVersion: "16"
    # Enable pgvector via Render dashboard / SQL: CREATE EXTENSION IF NOT EXISTS vector;
