# Render Blueprint — https://render.com/docs/blueprint-spec
# Connect this repo in Render and apply the blueprint, then set secrets in the dashboard.

services:
  - type: web
    name: cinetaste-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: API_PREFIX
        value: /api/v1
      - key: CORS_ORIGINS
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cinetaste-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: cinetaste-redis
          type: redis
          property: connectionString
      - key: TMDB_API_KEY
        sync: false
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: WEB_CONCURRENCY
        value: "2"

  - type: redis
    name: cinetaste-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

databases:
  - name: cinetaste-db
    plan: starter
    postgresMajorVersion: "16"
    # Enable pgvector via Render dashboard / SQL: CREATE EXTENSION IF NOT EXISTS vector;
