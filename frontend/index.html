<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CineTaste — movie and TV recommendations that understand your taste."
    />
    <title>CineTaste</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        try {
          var ck = "ct_contrast";
          var cv = localStorage.getItem(ck);
          if (cv === "high" || cv === "normal") {
            document.documentElement.setAttribute("data-contrast", cv);
          } else if (window.matchMedia("(prefers-contrast: more)").matches) {
            document.documentElement.setAttribute("data-contrast", "high");
          } else {
            document.documentElement.setAttribute("data-contrast", "normal");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-contrast", "normal");
        }
        try {
          var tk = "ct_color_scheme";
          var tv = localStorage.getItem(tk);
          var theme = "dark";
          if (tv === "light") theme = "light";
          else if (tv === "dark") theme = "dark";
          else if (window.matchMedia("(prefers-color-scheme: light)").matches) {
            theme = "light";
          }
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e2) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
