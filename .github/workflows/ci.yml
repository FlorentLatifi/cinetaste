name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: cinetaste
          POSTGRES_PASSWORD: cinetaste
          POSTGRES_DB: cinetaste
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinetaste -d cinetaste"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      APP_ENV: test
      APP_DEBUG: "false"
      JWT_SECRET: ci-test-secret-key-at-least-32-characters-long
      DATABASE_URL: postgresql+asyncpg://cinetaste:cinetaste@localhost:5432/cinetaste
      REDIS_URL: redis://localhost:6379/0
      CORS_ORIGINS: http://localhost:5173

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: ruff check app tests

      - name: Unit tests
        run: pytest -q -m "not integration"

      - name: Integration tests (Postgres + Redis)
        run: pytest -q tests/integration -m integration

      - name: Import app
        run: python -c "from app.main import app; print(app.title)"

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: /api/v1

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Accessibility (axe on guest routes)
        run: npm run test:a11y
        env:
          CI: true
