services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: cinetaste
      POSTGRES_PASSWORD: cinetaste
      POSTGRES_DB: cinetaste
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinetaste -d cinetaste"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Local dev: root + bind mount + reload (prod image still non-root via entrypoint)
    user: "0:0"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://cinetaste:cinetaste@db:5432/cinetaste
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  redis_data:
