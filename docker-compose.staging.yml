# Staging stack — production-like, isolated from local dev and prod volumes.
#
# Usage (PowerShell):
#   copy .env.staging.example .env.staging
#   # fill secrets, then:
#   docker compose -p cinetaste-staging -f docker-compose.staging.yml --env-file .env.staging up --build
#
# Stop / wipe data:
#   docker compose -p cinetaste-staging -f docker-compose.staging.yml down -v

name: cinetaste-staging

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cinetaste}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.staging}
      POSTGRES_DB: ${POSTGRES_DB:-cinetaste_staging}
    ports:
      # Host port avoids clashing with local dev (5432) / prod compose
      - "${STAGING_DB_PORT:-5433}:5432"
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cinetaste} -d ${POSTGRES_DB:-cinetaste_staging}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${STAGING_REDIS_PORT:-6380}:6379"
    volumes:
      - redis_staging_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Prefer a real .env.staging (secrets). Example file works for `compose config` only.
    env_file:
      - ${ENV_FILE:-.env.staging.example}
    environment:
      APP_ENV: ${APP_ENV:-staging}
      APP_DEBUG: ${APP_DEBUG:-"false"}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cinetaste}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cinetaste_staging}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${STAGING_API_PORT:-8001}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

volumes:
  postgres_staging_data:
  redis_staging_data:
